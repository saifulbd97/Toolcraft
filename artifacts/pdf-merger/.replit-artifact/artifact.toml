kind = "web"
previewPath = "/"
title = "PDF Merger"
version = "1.0.0"
id = "artifacts/pdf-merger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21640

[services.development]
run = "../../node_modules/.bin/vite --config vite.config.ts --host 0.0.0.0"

[services.production]
build = [ "npm", "run", "build" ]
publicDir = "artifacts/pdf-merger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21640"
BASE_PATH = "/"
