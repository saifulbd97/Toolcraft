databases:
  - name: tolyx-db
    plan: free
    databaseName: tolyx
    user: tolyx

services:
  - type: web
    name: tolyx-app
    runtime: node
    plan: free
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install &&
      BASE_PATH=/ pnpm --filter @workspace/pdf-merger run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tolyx-db
          property: connectionString
      # Set these manually in the Render dashboard:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set to your Render app URL once deployed, e.g. https://tolyx-app.onrender.com
      - key: APP_URL
        sync: false
